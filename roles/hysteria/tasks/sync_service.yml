---
- name: Install Hysteria sync server script
  ansible.builtin.copy:
    src: hysteria_sync_server.py
    dest: /opt/hysteria/hysteria_sync_server.py
    mode: "0755"

- name: Install systemd unit for Hysteria sync
  ansible.builtin.template:
    src: hysteria-sync.service.j2
    dest: /etc/systemd/system/hysteria-sync.service
    mode: "0644"

- name: Enable and start Hysteria sync service
  ansible.builtin.systemd:
    name: hysteria-sync
    enabled: true
    state: started
    daemon_reload: true
