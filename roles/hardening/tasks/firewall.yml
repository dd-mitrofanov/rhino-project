---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default incoming policy to deny
  community.general.ufw:
    policy: deny
    direction: incoming

- name: Set default outgoing policy to allow
  community.general.ufw:
    policy: allow
    direction: outgoing

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow Xray inbound
  community.general.ufw:
    rule: allow
    port: "{{ xray_inbound_port }}"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
