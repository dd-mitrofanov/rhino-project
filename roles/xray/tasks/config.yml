---
# NOTE: Config validation (validate param) skipped — requires Docker running and image
# available on first run. To enable later: validate: "docker run --rm -v %s:/tmp/config.json:ro {{ xray_docker_image }}:{{ xray_version }} xray run -test -c /tmp/config.json"
- name: Template Xray config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../configs/production/templates/{{ xray_template }}"
    dest: "{{ xray_config_dir }}/config.json"
    owner: root
    group: root
    mode: "0644"
  notify: restart xray

- name: Template docker-compose
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../configs/production/templates/docker-compose.yml.j2"
    dest: "{{ xray_config_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: restart xray
